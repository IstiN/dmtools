plugins {
    id 'java-library'
}

apply plugin: 'maven-publish'

group = 'com.github.istin'
version = '1.0.9'

repositories {
    mavenCentral()
}

compileJava {
    sourceCompatibility = 1.8
    targetCompatibility = 1.8
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(8)
    }
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.7.0'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.7.0'

    api 'org.json:json:20230618'
    api 'com.squareup.okhttp3:okhttp:4.9.0'
    api 'org.apache.commons:commons-lang3:3.8.1'

    api 'com.thedeanda:lorem:2.1'

    api 'org.apache.logging.log4j:log4j-api:2.17.0'
    api 'org.apache.logging.log4j:log4j-core:2.17.1'

    api group: 'commons-io', name: 'commons-io', version: '2.7'
    api group: 'commons-codec', name: 'commons-codec', version: '1.13'
    api group: 'org.freemarker', name: 'freemarker', version: '2.3.30'
}

test {
    useJUnitPlatform()
}

java {
    withSourcesJar()
    withJavadocJar()
}

publishing {
    publications {
        maven(MavenPublication) {
            groupId = 'com.github.istin'
            artifactId = 'dmtools'
            version = "v1.0.9"
            from components.java

            pom {
                description = 'DM Tools Library'
            }
        }
    }
}