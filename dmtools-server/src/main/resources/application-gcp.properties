# Google Cloud Platform production profile configuration

# Google Cloud SQL PostgreSQL Configuration
# Uses the Cloud SQL Java Connector (postgres-socket-factory) which connects via
# the Cloud SQL Admin API (HTTPS/443) — no Authorized Networks needed, no Auth Proxy sidecar.
# CLOUD_SQL_INSTANCE format: PROJECT:REGION:INSTANCE (e.g. ai-native-478811:us-central1:learn-ai-db)
spring.datasource.url=jdbc:postgresql:///${DB_NAME:dmtools}?cloudSqlInstance=${CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.postgres.SocketFactory&ipTypes=PUBLIC
spring.datasource.username=${DB_USER:dmtools-user}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration for PostgreSQL with Auto-Schema Generation
spring.jpa.database=POSTGRESQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# HikariCP Connection Pool Configuration for Cloud Environment
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
# Reduced from 20000ms — socket factory connects fast, long timeout just hides failures
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=60000

# Disable Flyway - using JPA auto-schema generation instead
spring.flyway.enabled=false

# Disable H2 Console for production
spring.h2.console.enabled=false

# App Engine uses the PORT environment variable
server.port=${PORT:8080}

# Production logging levels
logging.level.root=WARN
logging.level.com.github.istin.dmtools=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# RBAC Configuration - Admin emails will be provided via environment variable ADMIN_EMAILS
# admin.emails=${ADMIN_EMAILS:istin2007@gmail.com}
admin.emails=istin2007@gmail.com
